name: Steam Metrics

on:
  schedule:
    # Runs weekly on Sunday at 18:30 UTC
    - cron: "30 18 * * 0"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  steam:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check Steam token availability
        id: check_token
        shell: bash
        run: |
          if [[ -n "${STEAM_TOKEN}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::STEAM_TOKEN secret is not configured — skipping Steam metrics generation"
          fi
        env:
          STEAM_TOKEN: ${{ secrets.STEAM_TOKEN }}

      - name: Resolve Steam vanity URL to Steam64 ID
        id: steam_id
        if: steps.check_token.outputs.available == 'true'
        shell: bash
        run: |
          STEAM_ID=$(curl -sf "https://api.steampowered.com/ISteamUser/ResolveVanityURL/v1/?key=${STEAM_TOKEN}&vanityurl=paranjayy" \
            | jq -r 'if .response.success == 1 then .response.steamid else "" end')
          if [[ -z "$STEAM_ID" ]]; then
            echo "::error::Failed to resolve Steam vanity URL 'paranjayy' to a Steam64 ID"
            exit 1
          fi
          echo "id=$STEAM_ID" >> "$GITHUB_OUTPUT"
        env:
          STEAM_TOKEN: ${{ secrets.STEAM_TOKEN }}

      - uses: lowlighter/metrics@latest
        if: steps.check_token.outputs.available == 'true'
        with:
          filename: metrics.steam.svg

          # Disable GitHub parts
          token: NOT_NEEDED
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""

          # Steam plugin
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: ${{ steps.steam_id.outputs.id }}

          plugin_steam_sections: recently-played
          plugin_steam_recent_games_limit: 3
          plugin_steam_achievements_limit: 0

name: Waka Readme

on:
  schedule:
    # Runs at 01:00 AM UTC daily
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "copilot/add-star-count-feature"]

jobs:
  waka-stats:
    name: Update Waka Stats
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_PROJECTS: "False"
          SHOW_UPDATED_DATE: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_EDITORS: "False"
          SHOW_LOC_CHART: "False"
          SHOW_TIMEZONE: "False"
          SHOW_OS: "False"
          SHOW_LANGUAGE: "True"
          SHOW_COMMIT_PERSONA: "True"
          SHOW_DAYS_OF_WEEK: "True"

  starred-count:
    name: Update Starred Count
    needs: waka-stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Get Starred Count
        id: get_stars
        run: |
          COUNT=$(curl -s -H "Authorization: bearer ${{ secrets.GH_TOKEN }}" \
            -X POST -d '{"query":"query { viewer { starredRepositories { totalCount } } }"}' \
            https://api.github.com/graphql | jq '.data.viewer.starredRepositories.totalCount')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
      - name: Update README
        run: |
          # Use | as delimiter for sed to avoid issues with potential special chars
          sed -i "s|<!-- STARRED -->.*<!-- /STARRED -->|<!-- STARRED -->${{ steps.get_stars.outputs.count }}<!-- /STARRED -->|g" README.md
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "chore: update starred count [skip ci]" || echo "No changes to commit"
          git push

# Combined metrics workflow
# Runs GitHub Metrics, Steam Metrics, and WakaTime Metrics in separate jobs.
# Visit https://github.com/lowlighter/metrics#-documentation for full reference.
name: Metrics

on:
  schedule:
    # Steam + WakaTime: weekly on Sunday at 18:30 UTC
    - cron: "30 18 * * 0"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  # ── GitHub profile metrics (manual / workflow_dispatch only) ─────────────────
  github-metrics:
    name: GitHub Metrics
    runs-on: ubuntu-latest
    # Only run when triggered manually, not on schedule or push
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    concurrency:
      group: metrics-github
      cancel-in-progress: true
    steps:
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: ${{ runner.os }}-cache-${{ hashFiles('**/lockfiles') }}

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          user: paranjayy
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Calcutta
          plugin_gists: yes
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_colors: github
          plugin_languages_sections: most-used
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: starred
          plugin_topics_sort: stars
          plugin_traffic: yes

  # ── Steam metrics ────────────────────────────────────────────────────────────
  steam:
    name: Steam Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check Steam token availability
        id: check_token
        shell: bash
        run: |
          if [[ -n "${STEAM_TOKEN}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::STEAM_TOKEN secret is not configured — skipping Steam metrics generation"
          fi
        env:
          STEAM_TOKEN: ${{ secrets.STEAM_TOKEN }}

      - uses: lowlighter/metrics@latest
        if: steps.check_token.outputs.available == 'true'
        with:
          filename: metrics.steam.svg

          token: NOT_NEEDED
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""

          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: 76561199379635572

          plugin_steam_sections: most-played
          plugin_steam_achievements_limit: 0

  # ── WakaTime metrics ─────────────────────────────────────────────────────────
  wakatime:
    name: WakaTime Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check WakaTime token availability
        id: check_token
        shell: bash
        run: |
          if [[ -n "${WAKATIME_TOKEN}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::WAKATIME_TOKEN secret is not configured — skipping WakaTime metrics generation"
          fi
        env:
          WAKATIME_TOKEN: ${{ secrets.WAKATIME_TOKEN }}

      - uses: lowlighter/metrics@latest
        if: steps.check_token.outputs.available == 'true'
        with:
          filename: metrics.wakatime.svg

          token: NOT_NEEDED
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""

          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, languages, editors, os
          plugin_wakatime_limit: 5
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_user: current
          plugin_wakatime_repositories_visibility: all

<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.5" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" rx="15" fill="url(#bg-grad)" stroke="#2c2e31" stroke-width="2" />
  
  <!-- Header: Monkeytype Brand -->
  <path d="M20 20h10v10H20zM35 20h10v10H35z" fill="#e2b714" />
  <text x="20" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="bold" fill="#e2b714">monkeytype</text>
  <text x="380" y="50" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#646669" text-anchor="end">paranjayy</text>
  
  <!-- Main Stats -->
  <g transform="translate(20, 80)">
    <!-- WPM -->
    <text x="0" y="20" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#646669">wpm</text>
    <text x="0" y="65" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e2b714">92</text>
    
    <!-- Accuracy -->
    <g transform="translate(140, 0)">
      <text x="0" y="20" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#646669">accuracy</text>
      <text x="0" y="65" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="800" fill="#d1d0c5">99%</text>
    </g>
  </g>
  
  <!-- Footer Stats -->
  <g transform="translate(20, 165)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#646669">tests completed:</text>
    <text x="105" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#d1d0c5">6</text>
    
    <text x="160" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#646669">typing time:</text>
    <text x="235" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#d1d0c5">03:00</text>
  </g>
  
  <!-- Progress Bar (Subtle) -->
  <rect x="20" y="185" width="360" height="4" rx="2" fill="#2c2e31" />
  <rect x="20" y="185" width="356" height="4" rx="2" fill="#e2b714" />
</svg>

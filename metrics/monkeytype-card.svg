<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="150" rx="15" fill="url(#bg-grad)" stroke="#2c2e31" stroke-width="1.5" />
  
  <!-- Monkeytype Logo (Stylized) -->
  <g transform="translate(25, 45) scale(1.8)" fill="#e2b714">
    <path d="M7.5 0C3.36 0 0 3.36 0 7.5S3.36 15 7.5 15 15 11.64 15 7.5 11.64 0 7.5 0zm0 13.5c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/>
    <path d="M10.5 6h-1c-.28 0-.5.22-.5.5s.22.5.5.5h1c.28 0 .5-.22.5-.5s-.22-.5-.5-.5zM5.5 6h-1c-.28 0-.5.22-.5.5s.22.5.5.5h1c.28 0 .5-.22.5-.5s-.22-.5-.5-.5z"/>
    <path d="M7.5 10c-1.1 0-2-.9-2-2h1c0 .55.45 1 1 1s1-.45 1-1h1c0 1.1-.9 2-2 2z"/>
  </g>
  
  <!-- Brand Text -->
  <text x="75" y="65" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800" fill="#e2b714">monkeytype</text>
  <text x="375" y="30" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#646669" text-anchor="end">paranjayy</text>
  
  <!-- Main Stats (Simplified) -->
  <g transform="translate(75, 105)">
    <!-- WPM -->
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#646669" font-weight="500">wpm</text>
    <text x="0" y="32" font-family="ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="800" fill="#e2b714">92</text>
    
    <!-- Accuracy -->
    <g transform="translate(130, 0)">
      <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#646669" font-weight="500">accuracy</text>
      <text x="0" y="32" font-family="ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="800" fill="#d1d0c5">99%</text>

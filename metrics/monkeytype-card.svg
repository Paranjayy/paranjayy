<svg width="450" height="240" viewBox="0 0 450 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="450" height="240" rx="12" fill="#171A20"/>
  <rect x="0.5" y="0.5" width="449" height="239" rx="11.5" stroke="#2D333B" stroke-opacity="0.5"/>
  
  <!-- Header -->
  <g transform="translate(20, 20)">
    <g transform="scale(0.8) translate(0, 0)">
      <rect x="2" y="5" width="56" height="32" rx="10" stroke="#E2B714" stroke-width="4" fill="none"/>
      <path d="M12 26V18C12 16.5 13 15.5 14.5 15.5C16 15.5 17 16.5 17 18V26M17 18C17 16.5 18 15.5 19.5 15.5C21 15.5 22 16.5 22 18V26" stroke="#E2B714" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="34" cy="15" r="2.5" fill="#E2B714"/>
      <rect x="39" y="13.5" width="10" height="3" rx="1.5" fill="#E2B714"/>
      <rect x="32" y="22" width="20" height="3" rx="1.5" fill="#E2B714"/>
      <rect x="32" y="28" width="8" height="3" rx="1.5" fill="#E2B714"/>
      <circle cx="48" cy="29.5" r="2.5" fill="#E2B714"/>
    </g>
    <text x="55" y="24" fill="#E2B714" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="20">Monkeytype Stats</text>
    <text x="55" y="44" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="12">Joined 02 Feb 2025</text>
  </g>

  <!-- Level & XP -->
  <g transform="translate(320, 25)">
    <text x="100" y="0" text-anchor="end" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">LEVEL</text>
    <text x="100" y="22" text-anchor="end" fill="#E2B714" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="24">5</text>
    <rect x="0" y="30" width="100" height="6" rx="3" fill="#2D333B"/>
    <rect x="0" y="30" width="45" height="6" rx="3" fill="#E2B714"/>
    <text x="100" y="48" text-anchor="end" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="9">77 / 296 XP</text>
  </g>

  <!-- PB & Performance Grid -->
  <g transform="translate(20, 95)">
    <rect width="410" height="85" rx="8" fill="#1C2128" fill-opacity="0.5"/>
    
    <g transform="translate(15, 15)">
      <text x="0" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">15 SEC PB</text>
      <text x="0" y="25" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">-</text>
      
      <text x="100" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">30 SEC PB</text>
      <text x="100" y="25" fill="#E2B714" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="22">92 <tspan font-size="10" font-weight="normal" fill="#8B949E">WPM</tspan></text>
      <text x="100" y="45" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">ACCURACY: <tspan fill="#F0F6FC">99%</tspan></text>
      <text x="100" y="60" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">CONSISTENCY: <tspan fill="#F0F6FC">94%</tspan></text>
      
      <text x="210" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">60 SEC PB</text>
      <text x="210" y="25" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">-</text>

      <text x="310" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">WORDS TYPED</text>
      <text x="310" y="25" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">142</text>
      <text x="310" y="45" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">CPM: <tspan fill="#F0F6FC">460</tspan></text>
      <text x="310" y="60" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">CHARS: <tspan fill="#F0F6FC">710</tspan></text>
    </g>
  </g>

  <!-- Footer Metrics -->
  <g transform="translate(20, 210)">
    <text x="0" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">TESTS COMPLETED: <tspan fill="#F0F6FC" font-weight="bold">6</tspan></text>
    <text x="140" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">TIME TYPING: <tspan fill="#F0F6FC" font-weight="bold">0h 3m</tspan></text>
    <text x="270" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">TOTAL XP: <tspan fill="#F0F6FC" font-weight="bold">771</tspan></text>
    <text x="360" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">STREAK: <tspan fill="#E2B714" font-weight="bold">1 DAYS</tspan></text>

<svg width="450" height="230" viewBox="0 0 450 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="450" height="230" rx="12" fill="#171A20"/>
  <rect x="0.5" y="0.5" width="449" height="229" rx="11.5" stroke="#2D333B" stroke-opacity="0.5"/>
  
  <!-- Header -->
  <g transform="translate(20, 20)">
    <g transform="translate(0, 2)">
      <rect width="32" height="32" rx="6" fill="#E2B714"/>
      <path d="M8 22V10H11L16 16L21 10H24V22H21V14L16 20L11 14V22H8Z" fill="#171A20"/>
    </g>
    <text x="42" y="24" fill="#E2B714" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">Monkeytype Stats</text>
    <text x="42" y="42" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">Joined 02 Feb 2025</text>
  </g>

  <!-- Level & XP -->
  <g transform="translate(320, 25)">
    <text x="100" y="0" text-anchor="end" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">LEVEL</text>
    <text x="100" y="22" text-anchor="end" fill="#E2B714" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="24">5</text>
    <rect x="0" y="30" width="100" height="6" rx="3" fill="#2D333B"/>
    <rect x="0" y="30" width="45" height="6" rx="3" fill="#E2B714"/>
    <text x="100" y="48" text-anchor="end" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="9">77 / 296 XP</text>
  </g>

  <!-- PB Grid -->
  <g transform="translate(20, 90)">
    <rect width="410" height="70" rx="8" fill="#1C2128" fill-opacity="0.5"/>
    
    <g transform="translate(15, 15)">
      <text x="0" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">15 SEC PB</text>
      <text x="0" y="25" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">-</text>
      
      <text x="100" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">30 SEC PB</text>
      <text x="100" y="25" fill="#E2B714" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="20">92 <tspan font-size="10" font-weight="normal" fill="#8B949E">WPM</tspan></text>
      <text x="100" y="42" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">ACCURACY: <tspan fill="#F0F6FC">99%</tspan></text>
      
      <text x="200" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">60 SEC PB</text>
      <text x="200" y="25" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">-</text>

      <text x="300" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">WORDS TYPED</text>
      <text x="300" y="25" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="18">142</text>
      <text x="300" y="42" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="10">CHARS: <tspan fill="#F0F6FC">710</tspan></text>
    </g>
  </g>

  <!-- Footer Metrics -->
  <g transform="translate(20, 195)">
    <text x="0" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">TESTS: <tspan fill="#F0F6FC" font-weight="bold">6/6</tspan></text>
    <text x="120" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">TIME TYPING: <tspan fill="#F0F6FC" font-weight="bold">0h 3m</tspan></text>
    <text x="260" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">TOTAL XP: <tspan fill="#F0F6FC" font-weight="bold">771</tspan></text>
    <text x="360" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">STREAK: <tspan fill="#E2B714" font-weight="bold">1 DAYS</tspan></text>
  </g>
</svg>
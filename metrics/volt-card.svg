<svg width="400" height="230" viewBox="0 0 400 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="230" rx="12" fill="#171A20"/>
  <rect x="0.5" y="0.5" width="399" height="229" rx="11.5" stroke="#2D333B" stroke-opacity="0.5"/>
  
  <!-- Header -->
  <text x="20" y="35" fill="#F0F6FC" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="bold" font-size="18">Volt.fm Music Intelligence</text>
  <rect x="300" y="18" width="80" height="24" rx="12" fill="#1DB954" fill-opacity="0.1"/>
  <text x="315" y="34" fill="#1DB954" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="11">ALL TIME</text>

  <!-- All-Time Stats -->
  <g transform="translate(20, 65)">
    <text x="0" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="12">PLAYS</text>
    <text x="0" y="20" fill="#1DB954" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="16">67.5K</text>
    
    <text x="120" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="12">MINUTES</text>
    <text x="120" y="20" fill="#1DB954" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="16">4227h 39</text>
    
    <text x="240" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="12">SONGS</text>
    <text x="240" y="20" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="16">11,463</text>
  </g>

  <!-- Monthly Pulse -->
  <g transform="translate(20, 115)">
    <text x="0" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11" font-style="italic">MONTHLY PULSE</text>
    <text x="0" y="20" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="14">1.2K <tspan fill="#8B949E" font-weight="normal" font-size="10">PLAYS</tspan></text>
    <text x="120" y="20" fill="#F0F6FC" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="14">84h 12 <tspan fill="#8B949E" font-weight="normal" font-size="10">MINS</tspan></text>
  </g>

  <!-- Top Highlights -->
  <line x1="20" y1="165" x2="380" y2="165" stroke="#2D333B" stroke-width="1"/>
  
  <g transform="translate(20, 195)">
    <text x="0" y="0" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">TOP ARTIST: <tspan fill="#F0F6FC" font-weight="bold">Pritam</tspan></text>
    <text x="0" y="15" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">TOP SONG: <tspan fill="#F0F6FC" font-weight="bold">Agar Tum Saath Ho</tspan></text>
  </g>
</svg>